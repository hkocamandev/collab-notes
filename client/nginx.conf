# Static SPA + /api reverse proxy. yws is exposed on its own port (4001) so
# the browser connects to ws://localhost:4001 directly — no WebSocket upgrade
# proxying needed at this layer.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: client-side routing means deep links must serve index.html
  # so React Router can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST calls go to the API service. The Express app expects the /api
  # prefix on every route, so we forward verbatim.
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Tiny optimisation: hash-stamped Vite assets are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
